<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      font-family: 'Source Sans Pro', sans-serif;
      color: #333;
    }
    .thank-you {
      max-width: 600px;
    }
    .thank-you h1 {
      font-size: 3.6rem;
      color: #0062b9;
      margin-bottom: 1rem;
    }
    .thank-you p {
      font-size: 1.8rem;
      color: #555;
    }
    .btn--home {
      margin-top: 2rem;
      padding: 1rem 3rem;
      font-size: 1.6rem;
      background-color: #0062b9;
      color: #fff;
      border-radius: 5px;
      text-decoration: none;
      display: inline-block;
    }
    .btn--home:hover {
      background-color: #004e95;
    }
  </style>
</head>
<body>
  <div class="thank-you">
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.<br>I'll get back to you as soon as possible.</p>
    <a href="index.html" class="btn--home">Back to Home</a>
  </div>
</body>
</html>
